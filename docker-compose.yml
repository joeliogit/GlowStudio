version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: glowstudio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: glowstudio
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seeds/seed_stylists.sql:/docker-entrypoint-initdb.d/02_seed_stylists.sql
      - ./database/seeds/seed_services.sql:/docker-entrypoint-initdb.d/03_seed_services.sql
      - ./database/seeds/seed_products.sql:/docker-entrypoint-initdb.d/04_seed_products.sql
      - ./database/seeds/seed_users.sql:/docker-entrypoint-initdb.d/05_seed_users.sql
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U usuario -d glowstudio']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: glowstudio_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://usuario:password@postgres:5432/glowstudio
    ports:
      - '5000:5000'
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: glowstudio_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}

volumes:
  postgres_data:
